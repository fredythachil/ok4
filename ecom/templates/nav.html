
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<!-- basic -->
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- mobile metas -->
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="viewport" content="initial-scale=1, maximum-scale=1">
<!-- site metas -->
<title>Veggies</title>
  <link rel="icon" type="image/x-icon" href="{% static 'images/img-2.png' %}">
<meta name="keywords" content="">
<meta name="description" content="">
<meta name="author" content="">
<!-- bootstrap css -->
<link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
<!-- style css -->
<link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
<!-- Responsive-->
<link rel="stylesheet" href="{% static 'css/responsive.css' %}">
<!-- fevicon -->
<link rel="icon" href="{% static 'images/fevicon.png' %}" type="image/gif" />
<!-- Scrollbar Custom CSS -->
<link rel="stylesheet" href="{% static 'css/jquery.mCustomScrollbar.min.css' %}">
<!-- Tweaks for older IEs-->
<link rel="stylesheet" href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css">
<!-- owl stylesheets -->
<link rel="stylesheet" href="{% static 'css/owl.carousel.min.css' %}">
<link rel="stylesheet" href="{% static 'css/owl.theme.default.min.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.css" media="screen">
</head>
<body>

<div class="header_section">
    <div class="container-fluid">
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="logo"><a href="index.html"><img src="{% static 'images/logo.png' %}"></a></div>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav mr-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'ecomapp:index' %}">HOME</a>
            </li>
            {% if user.is_authenticated %}
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'ecomapp:cateories' %}#categories">Categories</a>
            </li>
            <li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'ecomapp:allproducts' %}#allproducts">All Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="" style="color:red;">{{user.username}}</a>
            </li>
              <li class="nav-item">
              <a class="nav-link" href="{% url 'ecomapp:logout' %}" style="color:blue;">Logout</a>

            </li>
            {% if  item_count > 0 %}
            <li><a href="{% url 'cart:cart_detail' %}"><img src="{% static 'images/cart.jpg' %}" style="height:40px;width:40px;">{{item_count}}</a>
            {% endif %}
            </li>


            {% else %}

            <li class="nav-item">
              <a class="nav-link" href="{% url 'ecomapp:about' %}#about">ABOUT</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#contact">CONTACT US</a>
            </li>
            <div class="dropdown">
  <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
    Login
  </button>
  <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
    <a class="dropdown-item" href="{% url 'ecomapp:login' %}">Login</a>
    <a class="dropdown-item" href="{% url 'ecomapp:register' %}">Register</a>
    {% endif %}
    </ul>
          <form class="form-inline my-2 my-lg-0" action="{% url 'ecomapp:search' %}" method="post">
            {% csrf_token %}

        <input class="h-25 form-inline-block" style="width: 120px;" type="search" placeholder="Search"  name="search">&nbsp;

             <div class="search_icon">
            <input type="image" src="{% static 'images/search-icon.png' %}" alt="Submit" ></div>

          </form>

  </div>
</div>







        </div>
      </nav>
    </div>
  </div>
</body>
